<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0c1a28"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Doctorapp"/>
  <title>Doctorapp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c1a28; font-family: 'Palatino Linotype', Georgia, serif; color: #dde8f0; min-height: 100vh; }
    input[type=range] { width: 100%; }
    input:focus { outline: 2px solid #3fb8c044; }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
const { useState, useMemo } = React;

    function formatARS(v) {
      if (!v && v !== 0) return "–";
      return new Intl.NumberFormat("es-AR", {
        style: "currency", currency: "ARS",
        minimumFractionDigits: 0, maximumFractionDigits: 0,
      }).format(v);
    }

    function parseNum(s) {
      return parseFloat(String(s).replace(/[^\d.,]/g, "").replace(",", ".")) || 0;
    }

    async function askClaude(messages, system) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system,
          messages,
        }),
      });
      const data = await res.json();
      return data.content.map(b => b.text || "").join("");
    }

    async function analizarPractica(practica, equipos) {
      const listaEquipos = equipos.length
        ? equipos.map((e, i) => `${i}: ${e.nombre}`).join("\n")
        : "ninguno";
      const system = `Eres un experto en medicina estética y alternativa en Argentina, especializado en costos y tiempos de prácticas médicas.
Respondé SOLO con JSON válido (sin markdown ni backticks):
{
  "descripcion": "descripción breve",
  "duracion_minutos": número,
  "insumos": [
    { "nombre": "nombre", "cantidad_sesion": número, "unidad": "ml/cc/unidad/etc", "precio_unitario_estimado": número, "nota_precio": "referencia" }
  ],
  "equipos_usados": [índices],
  "aclaracion": "aclaración si corresponde"
}
REGLAS: 1. CARTUCHOS HIFU: rinde ~12 sesiones → 0.083. 2. GEL: ~20-30ml/sesión, tubo 250ml rinde ~10 → 0.1. 3. Si dura varias sesiones usá fracción decimal.`;
      const txt = await askClaude([{ role: "user", content: `Práctica: ${practica}\nEquipos:\n${listaEquipos}` }], system);
      return JSON.parse(txt.replace(/```json|```/g, "").trim());
    }

    async function estimarMercado(practicas, ubicacion) {
      const lista = practicas.map(p => p.nombre).join(", ");
      const system = `Eres experto en honorarios médicos de medicina estética. Estimá honorarios de mercado de profesionales independientes en consultorio privado según la ubicación.
Respondé SOLO con JSON válido: { "nombre_practica": { "minimo": número, "maximo": número, "tipico": número, "moneda": "ARS/USD", "nota": "observación" } }`;
      const txt = await askClaude([{ role: "user", content: `Prácticas: ${lista}\nUbicación: ${ubicacion}` }], system);
      return JSON.parse(txt.replace(/```json|```/g, "").trim());
    }

    async function sugerirInsumo(nombreInsumo, nombrePractica) {
      const system = `Eres experto en costos de insumos médicos en Argentina. Respondé SOLO con JSON válido:
{ "cantidad_sesion": número, "unidad": "ml/cc/unidad/etc", "precio_unitario": número, "nota": "explicación" }
Si el insumo dura varias sesiones usá fracción decimal en cantidad_sesion.`;
      const txt = await askClaude([{ role: "user", content: `Insumo: ${nombreInsumo}\nPráctica: ${nombrePractica}` }], system);
      return JSON.parse(txt.replace(/```json|```/g, "").trim());
    }

    const newEquipo = () => ({ id: Date.now() + Math.random(), nombre: "", valor: "", vidaUtil: "" });
    const newInsumo = () => ({ id: Date.now() + Math.random(), nombre: "", cantidad_sesion: "", unidad: "", precio_unitario: "", nota_precio: "", loadingSugerencia: false });
    const newPractica = () => ({ id: Date.now() + Math.random(), nombre: "", sesiones: "", loading: false, duracionIA: false, insumos: [newInsumo()], equiposUsados: [], duracion: "", error: "" });

    const COST_FIELDS = [
      { key: "alquiler", label: "Alquiler del Consultorio", icon: "🏥" },
      { key: "empleados", label: "Empleados / Personal", icon: "👥" },
      { key: "impuestos", label: "Impuestos / Cargas Fiscales", icon: "📋" },
      { key: "telefono", label: "Teléfono / Servicios", icon: "📞" },
    ];function App() {
      const [step, setStep] = useState("costos");
      const [costos, setCostos] = useState({ alquiler: "", empleados: "", impuestos: "", telefono: "" });
      const [horasMes, setHorasMes] = useState("160");
      const [ganancia, setGanancia] = useState("40");
      const [ubicacion, setUbicacion] = useState("");
      const [equipos, setEquipos] = useState([newEquipo()]);
      const [practicas, setPracticas] = useState([newPractica()]);
      const [mercado, setMercado] = useState(null);
      const [loadingMercado, setLoadingMercado] = useState(false);

      const bg = "#0c1a28", teal = "#3fb8c0", green = "#2ecc71", amber = "#e8a020";
      const violet = "#9b72cf", rose = "#e05a7a", muted = "#6a8aaa", text = "#dde8f0";

      const card = (border = "#2a5070") => ({ background: "rgba(255,255,255,0.033)", border: `1px solid ${border}44`, borderRadius: "11px", padding: "14px", marginBottom: "12px" });
      const inp = { background: "rgba(0,0,0,0.45)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: "7px", color: text, fontFamily: "inherit", outline: "none", width: "100%", padding: "9px 12px", fontSize: "15px" };
      const inpSm = { background: "rgba(0,0,0,0.45)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: "7px", color: text, fontFamily: "inherit", outline: "none", width: "100%", padding: "5px 7px", fontSize: "13px" };
      const btn = (on = true, col = teal) => ({ width: "100%", padding: "13px", marginTop: "8px", background: on ? col : "rgba(255,255,255,0.07)", border: "none", borderRadius: "9px", color: on ? "#fff" : muted, fontSize: "14px", cursor: on ? "pointer" : "not-allowed", fontFamily: "inherit" });
      const row = { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" };
      const secTitle = (c = teal) => ({ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: c, marginBottom: "10px" });

      const totalFijos = Object.values(costos).reduce((a, v) => a + parseNum(v), 0);
      const minutosMes = parseNum(horasMes) * 60;
      const minutosOcupados = useMemo(() => practicas.reduce((s, p) => s + parseNum(p.duracion) * parseNum(p.sesiones), 0), [practicas]);
      const utilizacion = minutosMes > 0 ? Math.min(minutosOcupados / minutosMes, 1) : 0;

      const practicasCalculadas = useMemo(() => practicas.map(p => {
        const duracion = parseNum(p.duracion), sesiones = parseNum(p.sesiones);
        const fraccion = minutosOcupados > 0 ? (duracion * sesiones) / minutosOcupados : 0;
        const costoFijoPorSesion = sesiones > 0 ? (totalFijos * fraccion) / sesiones : 0;
        const costoInsumos = p.insumos.reduce((s, i) => s + parseNum(i.cantidad_sesion) * parseNum(i.precio_unitario), 0);
        const amortTotal = p.equiposUsados.reduce((s, eqIdx) => {
          const eq = equipos[eqIdx]; if (!eq) return s;
          const valor = parseNum(eq.valor), años = parseNum(eq.vidaUtil);
          if (!valor || !años || !minutosMes) return s;
          return s + (valor / (años * 12 * minutosMes)) * duracion;
        }, 0);
        const costoTotal = costoFijoPorSesion + costoInsumos + amortTotal;
        return { ...p, costoFijoPorSesion, costoInsumos, amortTotal, costoTotal, precioFinal: costoTotal * (1 + parseNum(ganancia) / 100), fraccion };
      }), [practicas, totalFijos, minutosOcupados, minutosMes, ganancia, equipos]);

      const anyAnalyzed = practicas.some(p => p.duracionIA || (p.duracion && p.insumos.some(i => i.nombre)));

      const updEq = (id, f, v) => setEquipos(prev => prev.map(e => e.id === id ? {...e, [f]: v} : e));
      const updPrac = (id, f, v) => setPracticas(prev => prev.map(p => p.id === id ? {...p, [f]: v} : p));
      const updIns = (pracId, insId, f, v) => setPracticas(prev => prev.map(p => p.id !== pracId ? p : {...p, insumos: p.insumos.map(i => i.id === insId ? {...i, [f]: v} : i)}));
      const toggleEq = (pracId, eqIdx) => setPracticas(prev => prev.map(p => { if (p.id !== pracId) return p; const u = p.equiposUsados.includes(eqIdx) ? p.equiposUsados.filter(i => i !== eqIdx) : [...p.equiposUsados, eqIdx]; return {...p, equiposUsados: u}; }));
      const addInsAt = (pracId) => setPracticas(prev => prev.map(p => p.id !== pracId ? p : {...p, insumos: [...p.insumos, newInsumo()]}));
      const removeIns = (pracId, insId) => setPracticas(prev => prev.map(p => p.id !== pracId ? p : {...p, insumos: p.insumos.filter(i => i.id !== insId)}));

      async function pedirSugerencia(pracId, insId, nomIns, nomPrac) {
        if (!nomIns.trim() || !nomPrac.trim()) return;
        setPracticas(prev => prev.map(p => p.id !== pracId ? p : {...p, insumos: p.insumos.map(i => i.id === insId ? {...i, loadingSugerencia: true} : i)}));
        try {
          const s = await sugerirInsumo(nomIns, nomPrac);
          setPracticas(prev => prev.map(p => p.id !== pracId ? p : {...p, insumos: p.insumos.map(i => i.id !== insId ? i : {...i, cantidad_sesion: String(s.cantidad_sesion ?? i.cantidad_sesion), unidad: s.unidad || i.unidad, precio_unitario: String(s.precio_unitario ?? i.precio_unitario), nota_precio: s.nota || "", loadingSugerencia: false})}));
        } catch { setPracticas(prev => prev.map(p => p.id !== pracId ? p : {...p, insumos: p.insumos.map(i => i.id === insId ? {...i, loadingSugerencia: false} : i)})); }
      }

      async function analizarUnaPractica(prac) {
        if (!prac.nombre.trim()) return;
        updPrac(prac.id, "loading", true); updPrac(prac.id, "error", "");
        try {
          const namedEqs = equipos.filter(e => e.nombre);
          const data = await analizarPractica(prac.nombre, namedEqs);
          const mappedEqs = (data.equipos_usados || []).filter(i => i < namedEqs.length).map(i => equipos.indexOf(namedEqs[i]));
          setPracticas(prev => prev.map(p => p.id !== prac.id ? p : {...p, loading: false, duracionIA: true, duracion: String(data.duracion_minutos ?? ""), equiposUsados: mappedEqs, aclaracion: data.aclaracion || "", insumos: p.insumos.length === 1 && !p.insumos[0].nombre ? data.insumos.map(ins => ({...newInsumo(), nombre: ins.nombre, unidad: ins.unidad ?? "", cantidad_sesion: "", precio_unitario: ""})) : p.insumos}));
        } catch (e) { updPrac(prac.id, "loading", false); updPrac(prac.id, "error", "Error: " + e.message); }
      }

      const TABS = [
        { id: "costos", label: "⚙️ Costos" },
        { id: "equipos", label: "🔧 Equipos" },
        { id: "practicas", label: "🩺 Prácticas" },
        { id: "resultado", label: "💰 Precio" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: bg, fontFamily: "'Palatino Linotype', Georgia, serif", color: text, paddingBottom: "56px" }}>
          <div style={{ background: "linear-gradient(180deg,#14283e 0%,#0c1a28 100%)", borderBottom: `1px solid ${teal}33`, padding: "16px 20px 13px", textAlign: "center" }}>
            <div style={{ fontSize: "10px", letterSpacing: "5px", color: teal, textTransform: "uppercase", marginBottom: "3px" }}>Consultorio Médico</div>
            <h1 style={{ margin: "0 0 3px", fontSize: "19px", fontWeight: "normal" }}>Calculadora de Prácticas <span style={{ color: teal, fontStyle: "italic", fontWeight: "bold" }}>Doctorapp</span></h1>
            <div style={{ fontSize: "11px", color: muted, fontStyle: "italic" }}>costos proporcionales al tiempo · múltiples prácticas</div>
          </div>
          <div style={{ display: "flex", background: "rgba(0,0,0,0.35)", borderBottom: `1px solid ${teal}22` }}>
            {TABS.map(t => (<button key={t.id} onClick={() => setStep(t.id)} style={{ flex: 1, padding: "10px 2px", border: "none", cursor: "pointer", background: step === t.id ? `${teal}18` : "transparent", color: step === t.id ? teal : muted, fontSize: "10px", fontFamily: "inherit", borderBottom: step === t.id ? `2px solid ${teal}` : "2px solid transparent" }}>{t.label}</button>))}
          </div>
          <div style={{ padding: "18px 16px", maxWidth: "480px", margin: "0 auto" }}>
            {step === "costos" && <>
              <p style={{ fontSize: "12px", color: muted, fontStyle: "italic", textAlign: "center", marginBottom: "16px" }}>Costos fijos mensuales del consultorio</p>
              {COST_FIELDS.map(f => (<div key={f.key} style={card()}><div style={{ fontSize: "12px", color: muted, marginBottom: "6px" }}>{f.icon} {f.label}</div><div style={{ display: "flex", gap: "6px", alignItems: "center" }}><span style={{ color: teal }}>$</span><input type="number" placeholder="0" value={costos[f.key]} onChange={e => setCostos(p => ({...p, [f.key]: e.target.value}))} style={inp}/></div></div>))}
              <div style={{...card(green), ...row, marginBottom: "12px"}}><span style={{ fontSize: "12px", color: muted }}>Total mensual:</span><span style={{ color: green, fontWeight: "bold", fontSize: "16px" }}>{formatARS(totalFijos)}</span></div>
              <div style={card(teal)}><div style={{ fontSize: "12px", color: muted, marginBottom: "6px" }}>🕐 Horas hábiles por mes</div><input type="number" placeholder="160" value={horasMes} onChange={e => setHorasMes(e.target.value)} style={inp}/>{horasMes && <div style={{ fontSize: "11px", color: teal, marginTop: "7px" }}>= {parseNum(horasMes) * 60} minutos</div>}</div>
              <div style={card(violet)}><div style={{ fontSize: "12px", color: muted, marginBottom: "6px" }}>📈 Margen de ganancia: <strong style={{ color: violet }}>{ganancia}%</strong></div><input type="range" min="0" max="200" step="5" value={ganancia} onChange={e => setGanancia(e.target.value)} style={{ width: "100%", accentColor: violet }}/><div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px", color: muted, marginTop: "3px" }}><span>0%</span><span>50%</span><span>100%</span><span>150%</span><span>200%</span></div></div>
              <div style={card(rose)}><div style={{ fontSize: "12px", color: muted, marginBottom: "6px" }}>📍 Ciudad y país</div><input type="text" placeholder="Ej: Buenos Aires, Argentina" value={ubicacion} onChange={e => { setUbicacion(e.target.value); setMercado(null); }} style={inp}/><div style={{ fontSize: "11px", color: "#c06070", marginTop: "6px", fontStyle: "italic" }}>Para estimar precios de mercado locales</div></div>
              <button style={btn(true, "#2980b9")} onClick={() => setStep("equipos")}>Siguiente → Equipos</button>
            </>}
            {step === "equipos" && <>
              <p style={{ fontSize: "12px", color: muted, fontStyle: "italic", textAlign: "center", marginBottom: "16px" }}>Registrá los equipos del consultorio</p>
              {equipos.map((eq, idx) => (<div key={eq.id} style={card(violet)}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}><div style={secTitle(violet)}>🔧 Equipo {idx + 1}</div>{equipos.length > 1 && <button onClick={() => setEquipos(prev => prev.filter(e => e.id !== eq.id))} style={{ background: "none", border: "none", color: rose, cursor: "pointer", fontSize: "16px" }}>✕</button>}</div><input type="text" placeholder="Nombre (Ej: Láser...)" value={eq.nombre} onChange={e => updEq(eq.id, "nombre", e.target.value)} style={{...inp, marginBottom: "10px"}}/><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}><div><div style={{ fontSize: "12px", color: muted, marginBottom: "5px" }}>💰 Valor ($)</div><input type="number" placeholder="0" value={eq.valor} onChange={e => updEq(eq.id, "valor", e.target.value)} style={inp}/></div><div><div style={{ fontSize: "12px", color: muted, marginBottom: "5px" }}>📅 Vida útil (años)</div><input type="number" placeholder="5" value={eq.vidaUtil} onChange={e => updEq(eq.id, "vidaUtil", e.target.value)} style={inp}/></div></div>{eq.valor && eq.vidaUtil && (<div style={{ marginTop: "10px", padding: "8px 10px", background: `${violet}15`, borderRadius: "7px" }}><div style={{ fontSize: "11px", color: muted }}>Amortización mensual:</div><div style={{ fontSize: "15px", color: violet, fontWeight: "bold" }}>{formatARS(parseNum(eq.valor) / parseNum(eq.vidaUtil) / 12)}</div></div>)}</div>))}
              <button onClick={() => setEquipos(prev => [...prev, newEquipo()])} style={{ width: "100%", padding: "11px", marginBottom: "8px", background: "transparent", border: `1px dashed ${violet}66`, borderRadius: "9px", color: violet, fontSize: "13px", cursor: "pointer", fontFamily: "inherit" }}>+ Agregar otro equipo</button>
              <button style={btn(true, "#2980b9")} onClick={() => setStep("practicas")}>Siguiente → Prácticas</button>
            </>}{step === "practicas" && <>
              <p style={{ fontSize: "12px", color: muted, fontStyle: "italic", textAlign: "center", marginBottom: "16px" }}>Agregá todas las prácticas que realizás en el mes</p>
              {practicas.map((prac, pIdx) => (<div key={prac.id} style={card(prac.duracionIA ? green : teal)}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}><div style={secTitle(prac.duracionIA ? green : teal)}>🩺 Práctica {pIdx + 1}</div>{practicas.length > 1 && <button onClick={() => setPracticas(prev => prev.filter(p => p.id !== prac.id))} style={{ background: "none", border: "none", color: rose, cursor: "pointer", fontSize: "16px" }}>✕</button>}</div><div style={{ display: "grid", gridTemplateColumns: "1fr 90px", gap: "8px", marginBottom: "8px" }}><div><div style={{ fontSize: "11px", color: muted, marginBottom: "4px" }}>Nombre</div><input type="text" placeholder="Ej: mesoterapia..." value={prac.nombre} onChange={e => updPrac(prac.id, "nombre", e.target.value)} style={inp}/></div><div><div style={{ fontSize: "11px", color: muted, marginBottom: "4px" }}>Ses./mes</div><input type="number" placeholder="20" value={prac.sesiones} onChange={e => updPrac(prac.id, "sesiones", e.target.value)} style={inp}/></div></div>{!prac.duracionIA && (<button onClick={() => analizarUnaPractica(prac)} disabled={!prac.nombre.trim() || !prac.sesiones || prac.loading} style={{...btn(!(!prac.nombre.trim() || !prac.sesiones || prac.loading), green), padding: "9px", fontSize: "12px", marginTop: "4px"}}>{prac.loading ? "⏳ Analizando..." : "🔍 Que la IA sugiera duración e insumos"}</button>)}{prac.error && <div style={{ fontSize: "11px", color: rose, marginTop: "6px" }}>⚠️ {prac.error}</div>}{(prac.duracionIA || prac.duracion) && (<div style={{ marginTop: "10px" }}><div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px", padding: "8px 10px", background: `${teal}12`, borderRadius: "7px", border: `1px solid ${teal}30` }}><span style={{ fontSize: "12px", color: muted, flex: 1 }}>⏱ Duración:</span><input type="number" min="1" value={prac.duracion} onChange={e => updPrac(prac.id, "duracion", e.target.value)} style={{ background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "6px", color: text, fontFamily: "inherit", outline: "none", width: "60px", padding: "4px 8px", fontSize: "14px", textAlign: "center" }}/><span style={{ fontSize: "12px", color: muted }}>min</span></div><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}><div style={{ fontSize: "11px", color: green, fontWeight: "bold" }}>🧪 Insumos por sesión</div><div style={{ display: "flex", gap: "6px" }}><button onClick={() => setPracticas(prev => prev.map(p => p.id !== prac.id ? p : {...p, insumos: p.insumos.map(i => ({...i, precio_unitario: "", nota_precio: ""}))}))} style={{ fontSize: "10px", padding: "3px 8px", background: "transparent", border: `1px solid ${amber}55`, borderRadius: "5px", color: amber, cursor: "pointer", fontFamily: "inherit" }}>$ propios</button><button onClick={() => setPracticas(prev => prev.map(p => p.id !== prac.id ? p : {...p, insumos: p.insumos.map(i => ({...i, cantidad_sesion: "", nota_precio: ""}))}))} style={{ fontSize: "10px", padding: "3px 8px", background: "transparent", border: `1px solid ${violet}55`, borderRadius: "5px", color: violet, cursor: "pointer", fontFamily: "inherit" }}>cant. propias</button></div></div>{prac.insumos.map((ins) => { const sub = parseNum(ins.cantidad_sesion) * parseNum(ins.precio_unitario); return (<div key={ins.id} style={{ background: "rgba(0,0,0,0.2)", borderRadius: "8px", padding: "10px", marginBottom: "8px", border: "1px solid rgba(255,255,255,0.05)" }}><div style={{ display: "flex", gap: "6px", alignItems: "center", marginBottom: "6px" }}><input type="text" placeholder="Nombre del insumo" value={ins.nombre} onChange={e => updIns(prac.id, ins.id, "nombre", e.target.value)} style={{ background: "rgba(0,0,0,0.45)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: "7px", color: text, fontFamily: "inherit", outline: "none", flex: 1, padding: "6px 10px", fontSize: "12px" }}/>{prac.insumos.length > 1 && <button onClick={() => removeIns(prac.id, ins.id)} style={{ background: "none", border: "none", color: rose, cursor: "pointer", fontSize: "14px" }}>✕</button>}</div><div style={{ display: "grid", gridTemplateColumns: "80px 70px 1fr", gap: "6px", marginBottom: "6px" }}><div><div style={{ fontSize: "9px", color: muted, marginBottom: "3px", textTransform: "uppercase", letterSpacing: "1px" }}>Unidad</div><input type="text" placeholder="ml, u..." value={ins.unidad} onChange={e => updIns(prac.id, ins.id, "unidad", e.target.value)} style={inpSm}/></div><div><div style={{ fontSize: "9px", color: muted, marginBottom: "3px", textTransform: "uppercase", letterSpacing: "1px" }}>Cant./ses.</div><input type="text" placeholder="0.08" value={ins.cantidad_sesion} onChange={e => updIns(prac.id, ins.id, "cantidad_sesion", e.target.value)} style={{...inpSm, textAlign: "right"}}/></div><div><div style={{ fontSize: "9px", color: muted, marginBottom: "3px", textTransform: "uppercase", letterSpacing: "1px" }}>$ Precio unit.</div><input type="text" placeholder="0" value={ins.precio_unitario} onChange={e => updIns(prac.id, ins.id, "precio_unitario", e.target.value)} style={{...inpSm, textAlign: "right"}}/></div></div><div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}><div style={{ flex: 1 }}>{ins.nota_precio && <div style={{ fontSize: "10px", color: "#3a8a5a", fontStyle: "italic" }}>💡 {ins.nota_precio}</div>}</div>{sub > 0 && <div style={{ fontSize: "13px", color: green, fontWeight: "bold", marginLeft: "8px" }}>{formatARS(sub)}</div>}</div><button onClick={() => pedirSugerencia(prac.id, ins.id, ins.nombre, prac.nombre)} disabled={!ins.nombre.trim() || ins.loadingSugerencia} style={{ width: "100%", marginTop: "8px", padding: "6px", background: ins.loadingSugerencia ? "rgba(255,255,255,0.04)" : `${teal}18`, border: `1px solid ${teal}33`, borderRadius: "6px", color: ins.loadingSugerencia ? muted : teal, fontSize: "11px", cursor: (!ins.nombre.trim() || ins.loadingSugerencia) ? "not-allowed" : "pointer", fontFamily: "inherit" }}>{ins.loadingSugerencia ? "⏳ Consultando IA..." : "✨ Quiero que la IA me sugiera cantidad y precio"}</button></div>);})}<button onClick={() => addInsAt(prac.id)} style={{ width: "100%", padding: "8px", marginBottom: "8px", background: "transparent", border: `1px dashed ${green}44`, borderRadius: "7px", color: green, fontSize: "11px", cursor: "pointer", fontFamily: "inherit" }}>+ Agregar insumo</button>{equipos.some(e => e.nombre) && (<div style={{ marginTop: "4px" }}><div style={{ fontSize: "11px", color: violet, marginBottom: "6px", fontWeight: "bold" }}>🔧 Equipos que usa esta práctica</div>{equipos.filter(e => e.nombre).map(eq => { const rIdx = equipos.indexOf(eq), activo = prac.equiposUsados.includes(rIdx); return (<div key={eq.id} onClick={() => toggleEq(prac.id, rIdx)} style={{ display: "flex", alignItems: "center", gap: "8px", padding: "6px 8px", marginBottom: "4px", borderRadius: "6px", cursor: "pointer", background: activo ? `${violet}15` : "transparent", border: `1px solid ${activo ? violet + "44" : "transparent"}` }}><div style={{ width: "16px", height: "16px", borderRadius: "3px", flexShrink: 0, background: activo ? violet : "transparent", border: `2px solid ${activo ? violet : muted}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", color: "#fff" }}>{activo ? "✓" : ""}</div><span style={{ fontSize: "12px", color: activo ? text : muted }}>{eq.nombre}</span></div>);})}</div>)}<button onClick={() => analizarUnaPractica(prac)} disabled={prac.loading} style={{...btn(true, "rgba(255,255,255,0.08)"), padding: "7px", fontSize: "11px", color: muted, marginTop: "8px"}}>🔄 Re-analizar con IA</button></div>)}</div>))}
              <button onClick={() => setPracticas(prev => [...prev, newPractica()])} style={{ width: "100%", padding: "11px", marginBottom: "8px", background: "transparent", border: `1px dashed ${teal}55`, borderRadius: "9px", color: teal, fontSize: "13px", cursor: "pointer", fontFamily: "inherit" }}>+ Agregar otra práctica</button>
              {anyAnalyzed && <button style={btn(true, green)} onClick={() => setStep("resultado")}>Ver resumen de precios →</button>}
            </>}
            {step === "resultado" && <>
              {!anyAnalyzed ? (<div style={{ textAlign: "center", padding: "40px 20px", color: muted, fontStyle: "italic" }}><div style={{ fontSize: "36px", marginBottom: "12px" }}>💰</div><p>Completá al menos una práctica.</p><button style={{...btn(true, "#2980b9"), width: "auto", padding: "10px 24px"}} onClick={() => setStep("practicas")}>Ir a prácticas</button></div>) : (<>
                <div style={card(teal)}><div style={secTitle(teal)}>📊 Utilización del consultorio</div><div style={row}><span style={{ fontSize: "12px", color: muted }}>Horas disponibles/mes</span><span style={{ color: text }}>{horasMes}h</span></div><div style={row}><span style={{ fontSize: "12px", color: muted }}>Minutos ocupados</span><span style={{ color: teal }}>{minutosOcupados} min</span></div><div style={{ background: "rgba(255,255,255,0.07)", borderRadius: "4px", height: "8px", marginBottom: "6px", overflow: "hidden" }}><div style={{ height: "100%", width: `${Math.min(utilizacion * 100, 100)}%`, background: utilizacion > 0.9 ? rose : utilizacion > 0.7 ? amber : green, borderRadius: "4px" }}/></div><div style={{ fontSize: "11px", color: utilizacion > 0.9 ? rose : utilizacion > 0.7 ? amber : green, textAlign: "right" }}>{(utilizacion * 100).toFixed(0)}% ocupación</div></div>
                {!mercado && (<button onClick={async () => { setLoadingMercado(true); try { setMercado(await estimarMercado(practicasCalculadas.filter(p => p.nombre && p.duracion), ubicacion || "Argentina")); } catch(e){} finally { setLoadingMercado(false); }}} disabled={loadingMercado} style={{ width: "100%", padding: "11px", marginBottom: "12px", background: loadingMercado ? "rgba(255,255,255,0.05)" : `${amber}18`, border: `1px solid ${amber}55`, borderRadius: "9px", color: loadingMercado ? muted : amber, fontSize: "13px", cursor: loadingMercado ? "not-allowed" : "pointer", fontFamily: "inherit" }}>{loadingMercado ? "⏳ Consultando..." : `🔎 ¿Cuánto cobran otros en ${ubicacion || "tu zona"}?`}</button>)}
                {mercado && (<div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}><div style={{ fontSize: "11px", color: amber, flex: 1 }}>📍 Mercado: <strong>{ubicacion || "Argentina"}</strong></div><button onClick={() => setMercado(null)} style={{ background: "none", border: `1px solid ${amber}44`, borderRadius: "6px", color: amber, fontSize: "11px", cursor: "pointer", padding: "4px 8px", fontFamily: "inherit" }}>🔄 Reconsultar</button></div>)}
                {practicasCalculadas.filter(p => p.nombre && p.duracion).map(p => { const mKey = mercado && Object.keys(mercado).find(k => k.toLowerCase().includes(p.nombre.toLowerCase()) || p.nombre.toLowerCase().includes(k.toLowerCase())); const m = mKey ? mercado[mKey] : null; let pos = null; if (m) { if (p.precioFinal < m.minimo * 0.9) pos = { label: "⬇ Por debajo del mercado", color: rose }; else if (p.precioFinal > m.maximo * 1.1) pos = { label: "⬆ Por encima del mercado", color: violet }; else if (p.precioFinal < m.tipico * 0.95) pos = { label: "↙ Levemente bajo", color: amber }; else if (p.precioFinal > m.tipico * 1.05) pos = { label: "↗ Levemente alto", color: teal }; else pos = { label: "✅ En línea con el mercado", color: green }; } return (<div key={p.id} style={card(green)}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" }}><div><div style={{ fontSize: "15px", color: text }}>{p.nombre}</div><div style={{ fontSize: "11px", color: muted, marginTop: "2px" }}>{p.sesiones} ses/mes · {p.duracion} min · {(p.fraccion * 100).toFixed(0)}% del tiempo</div></div><div style={{ textAlign: "right", flexShrink: 0, marginLeft: "10px" }}><div style={{ fontSize: "22px", color: green, fontWeight: "bold" }}>{formatARS(p.precioFinal)}</div><div style={{ fontSize: "10px", color: muted }}>tu precio / sesión</div></div></div><div style={{ background: "rgba(0,0,0,0.2)", borderRadius: "8px", padding: "10px", marginBottom: m ? "10px" : "0" }}>{[{ label: "Costos fijos proporcionales", value: p.costoFijoPorSesion, color: teal }, { label: "Insumos por sesión", value: p.costoInsumos, color: "#8fcc9f" }, { label: "Amortización de equipos", value: p.amortTotal, color: violet }].map(r => (<div key={r.label} style={{ display: "flex", justifyContent: "space-between", marginBottom: "5px" }}><span style={{ fontSize: "11px", color: muted }}>{r.label}</span><span style={{ fontSize: "11px", color: r.color }}>{formatARS(r.value)}</span></div>))}<div style={{ borderTop: "1px solid rgba(255,255,255,0.07)", paddingTop: "6px", marginTop: "4px", display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: "11px", color: muted }}>Costo + {ganancia}% ganancia</span><span style={{ fontSize: "11px", color: text }}>{formatARS(p.costoTotal)} → <strong style={{ color: green }}>{formatARS(p.precioFinal)}</strong></span></div></div>{m && (() => { const rMin = m.minimo, rMax = m.maximo, rango = rMax - rMin, pct = rango > 0 ? Math.max(0, Math.min(100, ((p.precioFinal - rMin) / rango) * 100)) : 50; return (<div style={{ background: `${amber}0f`, border: `1px solid ${amber}33`, borderRadius: "8px", padding: "10px" }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}><div style={{ fontSize: "11px", color: amber, fontWeight: "bold" }}>🔎 {ubicacion || "Argentina"}</div><div style={{ fontSize: "11px", color: pos?.color, fontWeight: "bold" }}>{pos?.label}</div></div><div style={{ position: "relative", marginBottom: "6px" }}><div style={{ height: "6px", borderRadius: "3px", background: `linear-gradient(90deg, ${rose}44, ${amber}44, ${green}44)` }}/><div style={{ position: "absolute", top: "-3px", left: `${Math.max(2, Math.min(96, pct))}%`, transform: "translateX(-50%)", width: "12px", height: "12px", borderRadius: "50%", background: pos?.color ?? green, border: "2px solid #0c1a28" }}/></div><div style={{ display: "flex", justifyContent: "space-between", fontSize: "10px", color: muted, marginBottom: m.nota ? "8px" : "0" }}><span>Mín: {formatARS(rMin)}</span><span style={{ color: amber }}>Típico: {formatARS(m.tipico)}</span><span>Máx: {formatARS(rMax)}</span></div>{m.nota && <div style={{ fontSize: "10px", color: muted, fontStyle: "italic" }}>💡 {m.nota}</div>}</div>); })()}</div>); })}
                <div style={card(amber)}><div style={secTitle(amber)}>📋 Resumen del mes</div>{practicasCalculadas.filter(p => p.nombre && p.duracion).map(p => (<div key={p.id} style={row}><span style={{ fontSize: "12px", color: muted }}>{p.nombre} × {p.sesiones}</span><span style={{ color: amber }}>{formatARS(p.precioFinal * parseNum(p.sesiones))}</span></div>))}<div style={{ borderTop: "1px solid rgba(255,255,255,0.07)", marginTop: "4px", paddingTop: "10px", ...row }}><span style={{ fontSize: "14px" }}>Facturación total estimada:</span><span style={{ color: green, fontWeight: "bold", fontSize: "18px" }}>{formatARS(practicasCalculadas.filter(p => p.nombre && p.duracion).reduce((s, p) => s + p.precioFinal * parseNum(p.sesiones), 0))}</span></div></div>
                <button style={btn(true, "#2980b9")} onClick={() => setStep("practicas")}>← Editar prácticas</button>
              </>)}
            </>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
